# Continuous integration: on every push and pull request, install the
# package on a fresh machine and run the full test suite.  This verifies
# the "executable on a different machine" requirement automatically.
name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.9 is the minimum declared in pyproject.toml; 3.12 is current.
        # Testing both ends of the range catches version-dependent breakage.
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the package with its test dependencies
        run: pip install .[test]

      - name: Run the test suite
        run: python -m pytest tests/ -v
